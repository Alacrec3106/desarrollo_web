<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta Halo</title>
    <link rel="stylesheet" href="reto_halo_style.css">
</head>
<body>

    <div class="halo-card">
        <img class="card-background" src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop" alt="Fondo de Halo">
        
        <div class="card-content">
            <img class="card-logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Halo_icon.svg/2048px-Halo_icon.svg.png" alt="Logo Halo">
            
            <p class="description">
                Halo Infinite - "The Chief" Statue.<br>
                Definitive 1:6 scale battle-worn statue. Hand-painted details. Commemorates the campaign.
            </p>
            
            <div class="card-footer">
                <span class="date">15.06.2024</span>
                <a href="#" class="learn-more">Learn More</a>
            </div>
        </div>
    </div>

</body>
</html>
